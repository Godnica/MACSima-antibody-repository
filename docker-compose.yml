services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: antibody
      POSTGRES_PASSWORD: antibody
      POSTGRES_DB: antibody_repo
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U antibody -d antibody_repo"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgresql://antibody:antibody@db:5432/antibody_repo
      JWT_SECRET: ${JWT_SECRET:-change-this-to-a-random-string}
      PORT: 3000
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
