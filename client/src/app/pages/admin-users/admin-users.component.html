<div class="page-header">
  <h2>User Management</h2>
  <button mat-flat-button color="primary" (click)="openAdd()">
    <mat-icon>person_add</mat-icon> Add User
  </button>
</div>

<mat-form-field appearance="outline" class="filter-field">
  <mat-label>Search</mat-label>
  <input matInput (keyup)="applyFilter($event)" placeholder="Username, name, role...">
  <mat-icon matSuffix>search</mat-icon>
</mat-form-field>

<table mat-table [dataSource]="dataSource" matSort class="mat-elevation-z1">

  <ng-container matColumnDef="username">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>Username</th>
    <td mat-cell *matCellDef="let row">{{ row.username }}</td>
  </ng-container>

  <ng-container matColumnDef="display_name">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>Display Name</th>
    <td mat-cell *matCellDef="let row">{{ row.display_name || '—' }}</td>
  </ng-container>

  <ng-container matColumnDef="role">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>Role</th>
    <td mat-cell *matCellDef="let row">
      <span class="role-badge role-{{ row.role }}">{{ row.role }}</span>
    </td>
  </ng-container>

  <ng-container matColumnDef="created_at">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>Created</th>
    <td mat-cell *matCellDef="let row">{{ row.created_at | date:'dd/MM/yyyy' }}</td>
  </ng-container>

  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef></th>
    <td mat-cell *matCellDef="let row" class="actions-cell">
      <button mat-icon-button (click)="openResetPassword(row)" title="Reset Password">
        <mat-icon>lock_reset</mat-icon>
      </button>
      <button mat-icon-button color="warn" (click)="confirmDelete(row)" title="Delete">
        <mat-icon>delete</mat-icon>
      </button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

  <tr class="mat-row" *matNoDataRow>
    <td class="mat-cell no-data" [attr.colspan]="displayedColumns.length">No users found</td>
  </tr>
</table>

<mat-paginator [pageSizeOptions]="[10, 25, 50]" showFirstLastButtons />
