<div class="page-header">
  <h2>Laboratories</h2>
  <button mat-flat-button color="primary" (click)="openAdd()">
    <mat-icon>add</mat-icon> Add Laboratory
  </button>
</div>

<mat-form-field appearance="outline" class="filter-field">
  <mat-label>Search</mat-label>
  <input matInput (keyup)="applyFilter($event)" placeholder="Name, PI, email...">
  <mat-icon matSuffix>search</mat-icon>
</mat-form-field>

<table mat-table [dataSource]="dataSource" matSort class="mat-elevation-z1">

  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>Name</th>
    <td mat-cell *matCellDef="let row">{{ row.name }}</td>
  </ng-container>

  <ng-container matColumnDef="pi_name">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>Principal Investigator</th>
    <td mat-cell *matCellDef="let row">{{ row.pi_name || '—' }}</td>
  </ng-container>

  <ng-container matColumnDef="email">
    <th mat-header-cell *matHeaderCellDef>Email</th>
    <td mat-cell *matCellDef="let row">{{ row.email || '—' }}</td>
  </ng-container>

  <ng-container matColumnDef="billing_address">
    <th mat-header-cell *matHeaderCellDef>Billing Address</th>
    <td mat-cell *matCellDef="let row">{{ row.billing_address || '—' }}</td>
  </ng-container>

  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef></th>
    <td mat-cell *matCellDef="let row" class="actions-cell">
      <button mat-icon-button (click)="openEdit(row)" title="Edit">
        <mat-icon>edit</mat-icon>
      </button>
      <button mat-icon-button color="warn" (click)="confirmDelete(row)" title="Delete">
        <mat-icon>delete</mat-icon>
      </button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

  <tr class="mat-row" *matNoDataRow>
    <td class="mat-cell no-data" [attr.colspan]="displayedColumns.length">No laboratories found</td>
  </tr>
</table>

<mat-paginator [pageSizeOptions]="[10, 25, 50]" showFirstLastButtons />
