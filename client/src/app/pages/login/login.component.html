<div class="login-container">
  <div class="login-card">
    <div class="login-logos">
      <img src="assets/logos/facility.png" alt="Facility Logo" class="login-logo facility">
    </div>

    <h1 class="login-title">Antibody Repository</h1>
    <p class="login-subtitle">Sign in to continue</p>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Username</mat-label>
        <input matInput formControlName="username" autocomplete="username">
        <mat-error *ngIf="form.get('username')?.hasError('required')">Username is required</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Password</mat-label>
        <input matInput type="password" formControlName="password" autocomplete="current-password">
        <mat-error *ngIf="form.get('password')?.hasError('required')">Password is required</mat-error>
      </mat-form-field>

      <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid || loading"
        class="full-width login-btn">
        @if (loading) {
        <mat-spinner diameter="20" />
        } @else {
        Sign In
        }
      </button>
    </form>
  </div>
</div>
