<div class="login-container">
  <mat-card class="login-card">
    <mat-card-header>
      <div class="login-branding">
        <img src="assets/facility_logo.png" alt="Facility Logo" class="login-logo">
        <mat-card-title>MACSima Antibody Repository</mat-card-title>
        <mat-card-subtitle>Sign in to continue</mat-card-subtitle>
      </div>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Username</mat-label>
          <input matInput formControlName="username" autocomplete="username">
          <mat-error *ngIf="form.get('username')?.hasError('required')">Username is required</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <input matInput type="password" formControlName="password" autocomplete="current-password">
          <mat-error *ngIf="form.get('password')?.hasError('required')">Password is required</mat-error>
        </mat-form-field>

        <div class="form-actions">
          <button mat-flat-button color="primary" type="submit"
                  [disabled]="form.invalid || loading" class="full-width">
            @if (loading) {
              <mat-spinner diameter="20" />
            } @else {
              Sign In
            }
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
